name: 刷步数

on:
  schedule:
    # 这里的 cron 会由脚本根据你的 CRON_HOURS 变量自动随机修改
    - cron: '4 0,2,4,6,8 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout codes
        uses: actions/checkout@v5
        with:
          # 使用你配置的 PAT 密钥，确保有权限回写代码
          token: ${{ secrets.PAT }} 

      - name: Update system and install zsh
        run: |
          sudo -E apt-get -qq update
          sudo -E apt-get install zsh -y
          
      - name: 初始化Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          
      - name: 开始执行
        env:
          CONFIG: ${{ secrets.CONFIG }}
          AES_KEY: ${{ secrets.AES_KEY }}
        run: |
          # 确保安装了所有必要的依赖，包括 pytz
          pip3 install requests pytz pycryptodome
          python3 main.py

      - name: persist tokens
        run: |
          git config user.name github-actions
          git config user.email github-actions@users.noreply.github.com
          git add .
          # 检查是否有文件变动（如 encrypted_tokens.data 或 cron_change_time）
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "persist tokens trigger by ${{ github.event_name }}"
            git push origin master
          else
            # 如果没有变动，打印信息并正常结束，不报错
            echo "No changes to commit, skipping push."
          fi
